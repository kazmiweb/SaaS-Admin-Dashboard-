services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: elookup
      POSTGRES_PASSWORD: elookup
      POSTGRES_DB: elookup
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - elookup_db:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - elookup_redis:/data

  backend:
    build: ./backend
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql://elookup:elookup@db:5432/elookup?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - db
      - redis
    # IMPORTANT: remove host bind-mount in production (it can overwrite dist and cause weirdness)
    # volumes:
    #   - ./backend:/app

  frontend:
    build: ./frontend
    env_file:
      - frontend/.env
    environment:
      VITE_API_BASE_URL: /api
      VITE_DEV_PROXY_TARGET: http://backend:8080
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - backend

volumes:
  elookup_db:
  elookup_redis:
